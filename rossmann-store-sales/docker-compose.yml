services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-rossmann
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Rossmann@13June"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./store.csv:/tmp/store.csv:ro
      - ./train.csv:/tmp/train.csv:ro
      - ./init:/init:ro
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -C -Q 'SELECT 1' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  init-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-rossmann-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "Rossmann@13June"
    volumes:
      - ./init:/init:ro
    entrypoint: ["/bin/bash", "/init/init.sh"]
    restart: "no"

volumes:
  mssql_data: